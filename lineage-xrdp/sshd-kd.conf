# /etc/ssh/sshd_config.d/10-kd.conf (WP-13, A8) — the terminal door, key-only, least-privilege.
# A8: SSH is tailnet-only (tailnet membership is sufficient auth; the door still establishes WHICH
# user via the key → A12). PasswordAuthentication OFF; only roster-installed authorized_keys admit.
# D3 least-privilege: no root login, no forwarding, no agent forwarding, no X11.
#
# BIND: loopback now. The tailnet ListenAddress (the real A8 reach) is added by a drop-in the
# tailnet WP writes when tailscaled brings up the 100.64/10 iface (the iface does not exist at
# boot). A2 holds by construction meanwhile: the port is never published + the container sits on a
# no-siblings podman network, so non-tailnet reach is empty (the same [ADJ-32] mechanism as grd).
ListenAddress 127.0.0.1

PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
PermitRootLogin no
PermitEmptyPasswords no

AllowTcpForwarding no
AllowAgentForwarding no
X11Forwarding no
GatewayPorts no
PermitTunnel no
PrintMotd no
