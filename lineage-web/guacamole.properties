# knowledge-desktop web door — guacamole.properties (DESIGN §3). The webapp's config.
# The postgresql-password is NOT here (E1: no secret in the image) — the entrypoint generates a
# random loopback-DB password at boot and appends it. The DB is 127.0.0.1-only ([ADJ-4], pgJDBC
# is TCP-only); it never leaves the container.

# guacd (stage-1 build) on the loopback
guacd-hostname: 127.0.0.1
guacd-port: 4822

# auth store: PostgreSQL (jdbc extension). Salted-SHA256 verifier (native scheme; the
# memory-hard-KDF gap is disclosed E6 R9, bounded by A3 TOTP + A4 ban + loopback-only DB).
postgresql-hostname: 127.0.0.1
postgresql-port: 5432
postgresql-database: guacamole_db
postgresql-username: guacamole
# Roster-provisioned users (kd-provision -> kd-web-sync) are the only accounts; the schema's
# default guacadmin is disabled at boot. Auto-create-accounts stays OFF (fail-closed, A12).
postgresql-auto-create-accounts: false

# A3 second factor: TOTP for EVERY user, self-enrolled at first login, no exemptions.
totp-issuer: knowledge-desktop

# A4 brute-force lockout: temporary per-source ban after repeated failures (the ban extension).
# ban-max-addresses is the CAP on how many source addresses the ban service tracks at once — it
# is NOT a disable knob (0 would track zero addresses = NO bans, silently breaking A4). Left at
# the extension's own default (512) by omission, which is the ban-ENABLED posture.
ban-max-invalid-attempts: 5
ban-address-duration-seconds: 300
