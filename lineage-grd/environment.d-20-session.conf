# /etc/environment.d/20-kd-session.conf (WP-08, L2) — session identity for EVERY user's
# `systemd --user` manager (environment.d is read by each user manager at start; no per-user
# seeding needed). XDG_SESSION_CLASS=user avoids the 120s tracker/localsearch dbus-activation
# timeouts a classless headless session otherwise hits.
XDG_CURRENT_DESKTOP=GNOME
XDG_SESSION_TYPE=wayland
XDG_SESSION_CLASS=user
