# user@.service drop-in (WP-08, L2) — (→ /etc/systemd/system/user@.service.d/99-cgroup-fix.conf)
# DEFENSIVE: Fedora 44's systemd 259 can fail user@<uid>.service inside a container cgroupns with
# "Failed to spawn executor: Device or resource busy" (systemd issue #41278, fixed in v261).
# The lingering per-user manager is the FOUNDATION of this whole lineage (every session +
# door rides it), so ship the one-line mitigation: an empty DelegateSubgroup= unsets the
# subgroup delegation that trips the EBUSY. A no-op where the bug is absent; REMOVE this file
# (single-line revert) if the gate ever shows it causing its own failure.
[Service]
DelegateSubgroup=
