# /etc/systemd/system/user@.service.d/50-xdg-runtime-dir.conf — defense-in-depth (research Q3.2).
# systemd-pam's pam_systemd.so is the PRIMARY setter of $XDG_RUNTIME_DIR (now installed). This
# drop-in is a zero-cost belt: user-runtime-dir@%i (BindsTo, ordered-before) has already created
# the plain 0700 /run/user/%i dir (its container fallback needs no CAP_SYS_ADMIN), so pinning the
# var here guarantees the per-user manager sees it even if the PAM path ever regresses. When
# pam_systemd works the PAM env overrides with the identical value — no conflict.
[Service]
Environment=XDG_RUNTIME_DIR=/run/user/%i
