# gnome-remote-desktop-headless.service drop-in (WP-08, L2)
# (→ /etc/systemd/user/gnome-remote-desktop-headless.service.d/override.conf)
#
# The SHIPPED unit installs only into gnome-session.target — which never exists on this
# gnome-session-less lineage. This drop-in (a) orders + requires it after the headless compositor
# and pipewire (grd's screencast dies without a session manager — the 0x904 failure), (b) forces
# software EGL (NO hardware GALLIUM_DRIVER here: mixing hw+sw EGL SIGSEGVs grd_egl_thread_new), and
# (c) SELF-HEALS the cold-llvmpipe compositor-readiness race: mutter needs seconds to export
# org.gnome.Mutter.RemoteDesktop, and a grd that starts too early dies "name has no owner"/0x904 —
# Restart=on-failure + StartLimitIntervalSec=0 keep retrying through the slow first boot instead of
# going permanently failed inside the 240s window.
#
# NO [Install] and NOT --global enabled (see Containerfile): grd must NEVER auto-start UNCONFIGURED
# at the linger instant — an empty store leaves the doors dark, and a later plain `start` no-ops the
# already-running daemon so the tls/port/enable config never reaches it. kd-session-enable is the
# SOLE starter, config-first: it writes the store THEN `systemctl --user restart` for a clean re-read.
[Unit]
After=gnome-shell-headless.service pipewire.socket wireplumber.service
Requires=gnome-shell-headless.service
Wants=pipewire.socket wireplumber.service
StartLimitIntervalSec=0

[Service]
Restart=on-failure
RestartSec=2
Environment=LIBGL_ALWAYS_SOFTWARE=1
Environment=MESA_LOADER_DRIVER_OVERRIDE=swrast
Environment=WAYLAND_DISPLAY=wayland-grd
