# /etc/environment.d/30-kd-display.conf (WP-08, L2) — the display env for every user process.
# WAYLAND_DISPLAY pins the compositor socket name (matches gnome-shell-headless.service).
# GSK_RENDERER=gl forces GTK4 off its Vulkan default onto llvmpipe GL — the no-GPU box has no
# Vulkan device (DESIGN §2 reconcile: no mesa-vulkan-drivers; fallback if apps crash
# VK_ERROR_DEVICE_LOST at the gate is adding lavapipe, one line).
WAYLAND_DISPLAY=wayland-grd
GDK_BACKEND=wayland
GSK_RENDERER=gl
